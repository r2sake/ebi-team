<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ebi-team 🦐 — エビチーム</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <!-- 狭幅時のみ表示するサイドバー（registry ドロワー）開閉ボタン。 -->
      <button id="sidebar-toggle" class="sidebar-toggle" title="registry を開閉" aria-label="registry を開閉">☰</button>
      <h1>🦐 ebi-team <span class="sub">エビチーム</span></h1>
      <div class="controls">
        <input id="spawn-cwd" type="text" placeholder="cwd（空ならデフォルト）" />
        <label class="wt-toggle" title="git worktree を切って隔離 cwd で起動">
          <input id="spawn-use-worktree" type="checkbox" />
          worktree
        </label>
        <input id="spawn-repo" type="text" placeholder="repo パス（空なら cwd）" class="wt-field" hidden />
        <input id="spawn-branch" type="text" placeholder="branch（空なら ebi/&lt;id&gt;）" class="wt-field" hidden />
        <label class="wt-toggle" title="ON にすると spawn 後に自動でそのエビへ表示を切り替える（既定 OFF＝master 等へのフォーカスを維持）">
          <input id="spawn-follow" type="checkbox" />
          spawn後に移動
        </label>
        <button id="spawn-btn">＋ エビを追加</button>
        <span id="conn-status" class="conn">接続中…</span>
      </div>
    </header>

    <main class="layout">
      <section id="stage" class="stage"><!-- 選択中の agent ペインを単独表示。非表示ペインも DOM 上に残す -->
        <!-- 使用状況ダッシュボード（REGISTRY 最上段「📊 ダッシュボード」選択時のみ表示）。 -->
        <div id="dashboard" class="dashboard" hidden></div>
        <!-- viewer（読み取り専用 md/txt プレビュー。REGISTRY の viewer 行選択時のみ表示）。 -->
        <div id="viewer" class="viewer" hidden></div>
        <!-- 監督・要約パネル（既定 OFF。supervisor 有効かつ要約結果がある時だけ表示） -->
        <div id="summary-panel" class="summary-panel" hidden>
          <div class="summary-head">
            <span class="summary-title">🔍 要約 <span id="summary-agent" class="summary-agent"></span></span>
            <button id="summary-close" class="summary-close" title="閉じる">✕</button>
          </div>
          <div id="summary-body" class="summary-body"></div>
        </div>
      </section>

      <!-- 狭幅ドロワー展開時の背景。タップで閉じる（広幅では非表示）。 -->
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <aside id="sidebar" class="sidebar">
        <div class="registry">
          <h2>registry <span class="h2-hint">クリックで切替</span></h2>
          <table id="registry-table">
            <thead>
              <tr><th>id</th><th>status</th><th>mode</th><th>branch</th><th>cwd</th><th>pid</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="log">
          <h2>notice</h2>
          <ul id="notice-list"></ul>
        </div>
      </aside>
    </main>

    <!-- ファイルピッカー（ユーザーが自分で md/txt を開くための簡易ブラウザ。既定は非表示）。
         中身は filePicker.ts が動的に構築する。 -->
    <div id="file-picker" hidden></div>

    <!-- スマホ用入力補助バー（狭幅時のみ表示）。スマホに無いキーを選択中ペインへ送る。 -->
    <div id="key-assist" class="key-assist" hidden>
      <button class="ka-btn" data-key="esc">Esc</button>
      <button class="ka-btn" data-key="tab">Tab</button>
      <button class="ka-btn ka-ctrl" data-key="ctrl">Ctrl</button>
      <button class="ka-btn" data-key="up">↑</button>
      <button class="ka-btn" data-key="down">↓</button>
      <button class="ka-btn" data-key="left">←</button>
      <button class="ka-btn" data-key="right">→</button>
      <button class="ka-btn" data-key="c-c">^C</button>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
